name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Testes, auditoria e build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: Executar testes
        run: npm test
      - name: Auditar catálogo
        run: npm run catalogo:auditoria
      - name: Verificar Astro e TypeScript
        run: npm run check
      - name: Gerar build
        run: npm run build